name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/nprobust/DESCRIPTION
          test -f Python/nprobust/pyproject.toml
          test -f Python/nprobust/setup.cfg
          test -f stata/stata.toc
          test -f stata/nprobust.pkg

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest

      - name: Install Python package
        working-directory: Python/nprobust
        run: python -m pip install -e ".[plot,test]"

      - name: Run Python tests
        working-directory: Python/nprobust
        run: python -m pytest

      - name: Build Python package
        working-directory: Python/nprobust
        run: python -m build

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(c("ggplot2", "broom", "sandwich", "testthat"), repos = repos)
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/nprobust

      - name: Check R package
        run: R CMD check nprobust_*.tar.gz --no-manual
