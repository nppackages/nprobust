name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/nprobust/DESCRIPTION
          test -f Python/nprobust/pyproject.toml
          test -f Python/nprobust/setup.cfg
          test -f stata/stata.toc
          test -f stata/nprobust.pkg
          grep -qx 'p nprobust' stata/stata.toc
          awk '$1 == "f" {print $2}' stata/nprobust.pkg | while read -r file; do
            test -f "stata/${file}"
          done

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest

      - name: Install Python package
        run: python -m pip install -e "Python/nprobust[plot,test]"

      - name: Check Python package
        run: |
          python -m compileall -q Python/nprobust/src/nprobust
          python -c "import nprobust; print('nprobust import OK')"
          python -m pytest Python/nprobust/tests

      - name: Build Python package
        run: python -m build Python/nprobust

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(
            c("ggplot2", "broom", "sandwich", "testthat"),
            repos = repos
          )
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/nprobust

      - name: Check R package
        run: R CMD check nprobust_*.tar.gz --no-manual
